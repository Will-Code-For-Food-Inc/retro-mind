name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build MCP server
        run: go build ./...

      - name: Build TUI
        run: cd cmd/tui && go build ./...

      - name: Test TUI
        run: cd cmd/tui && go test ./...
